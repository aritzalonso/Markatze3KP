<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap</title>
    <!-- ZUZENKETA/HOBEKUNTZA: CSS luzapena ondo jarrita (.css) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid bg-primary text-white p-3">
        <h1 class="text-center">Nire orrialdea</h1>
    </div>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container">
            <a class="navbar-brand">Logoa</a>

            <!-- ZUZENKETA: data-bs-target menuko ID-arekin bat dator orain (#menu) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Hasiera</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Zerbitzuak</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Kontaktua</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">

            <div class="col-md-8 col-12">
                <div class="row">

                    <div class="col-md-4">
                        <!-- HOBEKUNTZA: 'shadow-sm' klasea gehitu da txartelei sakontasuna emateko -->
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <!-- ZUZENKETA: card-title ondo idatzita ('t' bakarrarekin) -->
                                <h5 class="card-title">Card 1</h5> 
                                <p class="card-text">Edukia</p>
                                <!-- ZUZENKETA: btn-primary ondo idatzita (marratxoa faltan zuen) -->
                                <button class="btn btn-primary">Gehiago ikusi</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Card 2</h5>
                                <p class="card-text">Edukia</p>
                                <button class="btn btn-primary">Gehiago ikusi</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">Card 3</h5>
                                <p class="card-text">Edukia</p>
                                <button class="btn btn-primary">Gehiago ikusi</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-md-4">
                <!-- HOBEKUNTZA: 'rounded' klasea gehitu da alboko barra estetikoagoa izateko -->
                <div class="p-3 bg-light rounded">
                    <h4>Sidebar</h4>
                    <p>Lateraleko edukia</p>
                </div>
            </div>

        </div>
    </div>

    <!-- ZUZENKETA: JavaScript luzapena ondo jarrita (.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
